<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#8b4513"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>MindVault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #1a0f0a;
  --ink2: #3d2415;
  --paper: #f5efe6;
  --paper2: #ede4d6;
  --paper3: #e4d8c5;
  --warm: #c17f4a;
  --warm2: #d4956a;
  --accent: #8b4513;
  --accent2: #a0522d;
  --green: #4a7c59;
  --red: #8b2635;
  --gold: #c9a84c;
  --r: 14px;
  --nav-h: 68px;
  --shadow: 0 4px 24px rgba(44,24,16,.12);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: .5;
}

/* Warm radial glow */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(193,127,74,.08) 0%, transparent 60%),
              radial-gradient(ellipse 50% 40% at 80% 80%, rgba(139,69,19,.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  padding: 14px 20px;
  background: rgba(245,239,230,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1.5px solid var(--paper3);
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 900; font-style: italic;
  color: var(--accent);
  letter-spacing: -.5px;
}
.logo span { color: var(--ink2); font-style: normal; }
.header-right { display: flex; gap: 8px; align-items: center; }
.hdr-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--paper2); border: 1.5px solid var(--paper3);
  color: var(--ink2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content:center;
  transition: all .2s;
}
.hdr-btn:hover { background: var(--paper3); }
.stats-pill {
  display: flex; gap: 12px; align-items: center;
  background: var(--paper2); border: 1.5px solid var(--paper3);
  border-radius: 20px; padding: 6px 14px; font-size: 13px;
  color: var(--ink2);
}
.stats-pill strong { color: var(--accent); font-weight: 700; }

/* SEARCH BAR */
.search-wrap {
  padding: 14px 20px 0;
  position: relative; z-index: 1;
}
.search-box {
  display: flex; gap: 8px; align-items: center;
  background: var(--paper2); border: 2px solid var(--paper3);
  border-radius: 14px; padding: 10px 14px;
  transition: border-color .2s;
}
.search-box:focus-within { border-color: var(--warm); }
.search-icon { font-size: 16px; color: var(--warm2); flex-shrink: 0; }
.search-inp {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Crimson Pro', serif; font-size: 16px; color: var(--ink);
}
.search-inp::placeholder { color: rgba(61,36,21,.35); }
.search-clear {
  background: none; border: none; color: var(--ink2);
  cursor: pointer; font-size: 14px; opacity: 0; transition: opacity .2s;
  padding: 2px 4px;
}
.search-clear.show { opacity: 1; }

/* AI ANSWER BOX */
.ai-answer {
  margin: 12px 20px 0;
  background: linear-gradient(135deg, rgba(193,127,74,.1), rgba(139,69,19,.06));
  border: 1.5px solid rgba(193,127,74,.3);
  border-radius: var(--r); padding: 14px 16px;
  display: none;
  animation: fadeUp .3s ease;
}
.ai-answer.show { display: block; }
.ai-answer-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .1em; color: var(--warm); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.ai-answer-text {
  font-size: 15px; line-height: 1.7; color: var(--ink2);
  font-style: italic;
}
.ai-sources {
  margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px;
}
.ai-source-chip {
  font-size: 11px; background: rgba(193,127,74,.15);
  border: 1px solid rgba(193,127,74,.25); border-radius: 6px;
  padding: 3px 8px; color: var(--accent); cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
}
.ai-source-chip:hover { background: rgba(193,127,74,.25); }

/* ADD ENTRY */
.add-section { padding: 14px 20px 0; position: relative; z-index: 1; }
.add-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.add-tab {
  flex: 1; padding: 8px; border-radius: 10px; border: none;
  background: var(--paper2); color: var(--ink2);
  font-family: 'Crimson Pro', serif; font-size: 14px;
  cursor: pointer; transition: all .2s; text-align: center;
}
.add-tab.active {
  background: var(--accent); color: #fff;
  box-shadow: 0 3px 12px rgba(139,69,19,.25);
}

/* TEXT ENTRY */
.text-panel { display: block; }
.voice-panel { display: none; }
.textarea-wrap { position: relative; }
.entry-textarea {
  width: 100%; min-height: 100px; max-height: 200px;
  background: var(--paper2); border: 2px solid var(--paper3);
  border-radius: 14px; padding: 14px 16px;
  font-family: 'Crimson Pro', serif; font-size: 16px;
  line-height: 1.6; color: var(--ink); resize: none; outline: none;
  transition: border-color .2s;
}
.entry-textarea:focus { border-color: var(--warm); }
.entry-textarea::placeholder { color: rgba(61,36,21,.35); font-style: italic; }
.entry-actions {
  display: flex; gap: 8px; margin-top: 8px; align-items: center;
}
.tag-inp {
  flex: 1; background: var(--paper2); border: 1.5px solid var(--paper3);
  border-radius: 10px; padding: 9px 12px;
  font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--ink);
  outline: none; transition: border-color .2s;
}
.tag-inp:focus { border-color: var(--warm); }
.tag-inp::placeholder { color: rgba(61,36,21,.35); }
.save-btn {
  height: 38px; padding: 0 18px; border-radius: 10px;
  background: var(--accent); border: none; color: #fff;
  font-family: 'Crimson Pro', serif; font-size: 15px; font-weight: 500;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(139,69,19,.3);
  transition: all .2s;
}
.save-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.ai-summarize-btn {
  height: 38px; padding: 0 14px; border-radius: 10px;
  background: var(--paper2); border: 1.5px solid var(--paper3);
  color: var(--ink2); font-family: 'Crimson Pro', serif; font-size: 14px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .2s;
  display: flex; align-items: center; gap: 5px;
}
.ai-summarize-btn:hover { border-color: var(--warm); color: var(--warm); }

/* VOICE PANEL */
.voice-center {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px; padding: 20px 0;
}
.mic-ring {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--paper2); border: 3px solid var(--paper3);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; cursor: pointer; transition: all .3s;
  position: relative;
}
.mic-ring::before {
  content: ''; position: absolute; inset: -8px; border-radius: 50%;
  border: 2px solid transparent; transition: all .3s;
}
.mic-ring.recording {
  background: rgba(139,38,53,.1); border-color: var(--red);
  animation: micPulse 1.5s ease-in-out infinite;
}
.mic-ring.recording::before {
  border-color: rgba(139,38,53,.3);
  animation: ringExpand 1.5s ease-in-out infinite;
}
@keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(139,38,53,.3);} 50%{box-shadow:0 0 0 12px rgba(139,38,53,0);} }
@keyframes ringExpand { 0%{transform:scale(1);opacity:1;} 100%{transform:scale(1.5);opacity:0;} }
.mic-status { font-size: 14px; color: var(--ink2); font-style: italic; }
.voice-transcript {
  width: 100%; background: var(--paper2); border: 1.5px solid var(--paper3);
  border-radius: 12px; padding: 12px 14px; font-size: 15px;
  line-height: 1.6; color: var(--ink); min-height: 60px;
  font-style: italic;
}
.voice-actions { display: flex; gap: 8px; width: 100%; }

/* PROCESSING */
.processing-bar {
  margin: 10px 20px 0;
  background: var(--paper2); border-radius: 8px; overflow: hidden;
  height: 3px; display: none;
}
.processing-bar.show { display: block; }
.processing-fill {
  height: 100%; background: linear-gradient(90deg, var(--warm), var(--accent));
  border-radius: 8px; width: 0; transition: width .4s ease;
  animation: shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer { 0%,100%{opacity:1;} 50%{opacity:.6;} }

/* ENTRIES LIST */
.entries-wrap { padding: 16px 20px; padding-bottom: calc(var(--nav-h) + 20px); }
.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; color: var(--ink);
}
.section-count {
  font-size: 12px; color: var(--ink2);
  background: var(--paper2); border: 1px solid var(--paper3);
  border-radius: 10px; padding: 3px 10px;
}
.sort-btn {
  font-size: 13px; color: var(--warm); background: none; border: none;
  cursor: pointer; font-family: 'Crimson Pro', serif; padding: 4px;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

.entry-card {
  background: #fff; border: 1.5px solid var(--paper3);
  border-radius: var(--r); padding: 16px;
  margin-bottom: 10px; cursor: pointer;
  transition: all .2s; position: relative; overflow: hidden;
  animation: fadeUp .35s ease;
  box-shadow: var(--shadow);
}
.entry-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 0 2px 2px 0;
}
.entry-card.text-type::before { background: var(--warm); }
.entry-card.voice-type::before { background: var(--green); }
.entry-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(44,24,16,.15); border-color: var(--paper3); }

.entry-type-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 8px;
}
.entry-type-badge.text { color: var(--warm); }
.entry-type-badge.voice { color: var(--green); }

.entry-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700; line-height: 1.3;
  margin-bottom: 6px; color: var(--ink);
}
.entry-preview {
  font-size: 15px; line-height: 1.6; color: var(--ink2);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.entry-summary {
  margin-top: 10px; padding: 10px 12px;
  background: rgba(193,127,74,.08); border-left: 3px solid var(--warm2);
  border-radius: 0 8px 8px 0;
  font-size: 14px; line-height: 1.6; color: var(--ink2); font-style: italic;
}
.entry-footer {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; align-items: center;
}
.entry-tag {
  font-size: 12px; background: var(--paper); border: 1px solid var(--paper3);
  border-radius: 6px; padding: 2px 8px; color: var(--ink2);
  font-family: 'JetBrains Mono', monospace;
}
.entry-date { font-size: 12px; color: rgba(61,36,21,.45); margin-left: auto; }
.entry-actions-row {
  position: absolute; top: 12px; right: 12px;
  display: flex; gap: 4px; opacity: 0; transition: opacity .2s;
}
.entry-card:hover .entry-actions-row { opacity: 1; }
.entry-act {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--paper); border: 1px solid var(--paper3);
  color: var(--ink2); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.entry-act:hover { background: var(--paper3); }
.entry-act.del:hover { color: var(--red); border-color: var(--red); background: rgba(139,38,53,.08); }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--ink2);
}
.empty-icon {
  font-size: 56px; margin-bottom: 16px; opacity: .4;
  font-family: 'Playfair Display', serif;
}
.empty-title {
  font-family: 'Playfair Display', serif; font-size: 20px;
  font-weight: 700; margin-bottom: 8px; color: var(--ink);
}
.empty-sub { font-size: 15px; line-height: 1.6; font-style: italic; }

/* DETAIL VIEW */
.detail-view {
  position: fixed; inset: 0; background: var(--paper);
  z-index: 300; overflow-y: auto;
  transform: translateX(100%); transition: transform .3s ease;
}
.detail-view.open { transform: translateX(0); }
.detail-top {
  position: sticky; top: 0; z-index: 10;
  background: rgba(245,239,230,.95); backdrop-filter: blur(16px);
  border-bottom: 1.5px solid var(--paper3);
  padding: 14px 20px; display: flex; align-items: center; gap: 12px;
}
.back-btn {
  background: none; border: none; color: var(--accent);
  font-family: 'Playfair Display', serif; font-size: 15px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  font-weight: 700;
}
.detail-content { padding: 24px 20px; }
.detail-title-inp {
  width: 100%; background: none; border: none; outline: none;
  font-family: 'Playfair Display', serif; font-size: 26px;
  font-weight: 900; color: var(--ink); line-height: 1.2;
  margin-bottom: 16px; resize: none;
}
.detail-body {
  width: 100%; min-height: 200px; background: none;
  border: none; outline: none; resize: none;
  font-family: 'Crimson Pro', serif; font-size: 17px;
  line-height: 1.8; color: var(--ink2);
}
.detail-divider { height: 1.5px; background: var(--paper3); margin: 20px 0; }
.detail-summary-box {
  background: rgba(193,127,74,.08); border: 1.5px solid rgba(193,127,74,.2);
  border-radius: 12px; padding: 16px;
}
.detail-summary-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .1em; color: var(--warm); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.detail-summary-text {
  font-size: 16px; line-height: 1.7; color: var(--ink2); font-style: italic;
}
.detail-chat { margin-top: 20px; }
.chat-label {
  font-family: 'Playfair Display', serif; font-size: 16px;
  font-weight: 700; color: var(--ink); margin-bottom: 12px;
}
.chat-messages { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.chat-msg {
  padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.6;
  max-width: 90%;
}
.chat-msg.user {
  background: var(--accent); color: #fff; align-self: flex-end;
  border-radius: 12px 12px 2px 12px;
}
.chat-msg.ai {
  background: var(--paper2); border: 1.5px solid var(--paper3);
  color: var(--ink2); font-style: italic; align-self: flex-start;
  border-radius: 12px 12px 12px 2px;
}
.chat-inp-row { display: flex; gap: 8px; }
.chat-inp {
  flex: 1; background: var(--paper2); border: 2px solid var(--paper3);
  border-radius: 12px; padding: 10px 14px;
  font-family: 'Crimson Pro', serif; font-size: 15px; color: var(--ink);
  outline: none; transition: border-color .2s;
}
.chat-inp:focus { border-color: var(--warm); }
.chat-send {
  width: 42px; height: 42px; border-radius: 12px;
  background: var(--accent); border: none; color: #fff;
  font-size: 18px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.chat-send:hover { background: var(--accent2); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(245,239,230,.95); backdrop-filter: blur(16px);
  border-top: 1.5px solid var(--paper3);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 200; padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: rgba(61,36,21,.4);
  font-family: 'Crimson Pro', serif; font-size: 11px; font-weight: 500;
  cursor: pointer; padding: 8px 16px; border-radius: 12px;
  transition: all .2s; flex: 1;
}
.nav-item.active { color: var(--accent); }
.nav-item.active .nav-icon { transform: scale(1.15); }
.nav-icon { font-size: 22px; line-height: 1; transition: transform .2s; }

/* TOAST */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); border-radius: 12px;
  padding: 10px 20px; font-size: 14px; color: #fff;
  opacity: 0; transition: all .3s; z-index: 999;
  white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* TAGS VIEW */
.tags-view { padding: 16px 20px; padding-bottom: calc(var(--nav-h) + 20px); }
.tags-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.tag-filter {
  padding: 7px 16px; border-radius: 20px;
  background: var(--paper2); border: 1.5px solid var(--paper3);
  color: var(--ink2); font-family: 'Crimson Pro', serif; font-size: 14px;
  cursor: pointer; transition: all .2s;
}
.tag-filter.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

/* THINKING DOTS */
.thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.t-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--warm);
  animation: tdot .8s ease-in-out infinite;
}
.t-dot:nth-child(2){animation-delay:.15s;}
.t-dot:nth-child(3){animation-delay:.3s;}
@keyframes tdot{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

@media(min-width:768px){
  .entries-wrap{max-width:720px;margin:0 auto;}
  .add-section,.search-wrap{max-width:720px;margin-left:auto;margin-right:auto;}
  .detail-content{max-width:680px;margin:0 auto;}
}

/* FLASHCARDS */
.cards-section { margin-top: 20px; }
.cards-label {
  font-family: 'Playfair Display', serif; font-size: 16px;
  font-weight: 700; color: var(--ink); margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.gen-cards-btn {
  padding: 7px 16px; border-radius: 10px;
  background: var(--paper2); border: 1.5px solid var(--paper3);
  color: var(--ink2); font-family: 'Crimson Pro', serif; font-size: 14px;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 5px;
}
.gen-cards-btn:hover { border-color: var(--gold); color: var(--gold); }
.cards-grid { display: flex; flex-direction: column; gap: 10px; }
.flashcard {
  background: #fff; border: 1.5px solid var(--paper3);
  border-radius: 14px; cursor: pointer;
  box-shadow: var(--shadow); transition: all .25s;
  overflow: hidden;
}
.flashcard:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(44,24,16,.15); }
.card-question {
  padding: 16px 16px 12px;
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 700; color: var(--ink);
  display: flex; gap: 10px; align-items: flex-start;
}
.card-q-icon {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  background: rgba(193,127,74,.15); border: 1.5px solid rgba(193,127,74,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--warm); margin-top: 2px;
}
.card-answer {
  padding: 0 16px 16px 50px;
  font-size: 15px; line-height: 1.6; color: var(--ink2);
  font-style: italic; display: none;
  border-top: 1px dashed var(--paper3); padding-top: 12px; margin-top: 0;
}
.card-answer.show { display: block; }
.card-footer {
  padding: 0 16px 12px 50px;
  display: none; gap: 8px;
}
.card-footer.show { display: flex; }
.card-rate {
  flex: 1; padding: 7px; border-radius: 9px; border: none;
  font-family: 'Crimson Pro', serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; text-align: center;
}
.card-rate.know {

<div class="toast" id="toast"></div>

<script>
const CLAUDE_URL = 'https://openrouter.ai/api/v1/chat/completions';
const MODEL = 'anthropic/claude-haiku-4-5';

let entries = [];
let curEntry = null;
let curView = 'home';
let activeTag = null;
let voiceText = '';
let searchTimer = null;
let rec = null;
let isRecording = false;

// STORAGE
function save() { localStorage.setItem('mv_entries', JSON.stringify(entries)); }
function load() {
  try { entries = JSON.parse(localStorage.getItem('mv_entries') || '[]'); } catch(e) { entries = []; }
}

// UTILS
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toast(msg, dur=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function fmtDate(ts) {
  const d = new Date(ts), now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'только что';
  if (diff < 3600000) return Math.floor(diff/60000) + ' мин назад';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' ч назад';
  if (diff < 7*86400000) return Math.floor(diff/86400000) + ' дн назад';
  return d.toLocaleDateString('ru', {day:'numeric', month:'short'});
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

function progress(show, pct=0) {
  const bar = document.getElementById('procBar'), fill = document.getElementById('procFill');
  if (show) { bar.classList.add('show'); fill.style.width = pct + '%'; }
  else { bar.classList.remove('show'); fill.style.width = '0'; }
}

// OPENROUTER API (supports CORS from browser)
function getApiKey() {
  let key = localStorage.getItem('mv_or_key');
  if (!key) {
    key = prompt('Введи свой OpenRouter API ключ (sk-or-...):\n\n1. Зайди на openrouter.ai\n2. Sign in → Keys → Create Key\n3. Скопируй и вставь сюда\n\nБесплатные модели доступны без оплаты!');
    if (key && key.startsWith('sk-or-')) {
      localStorage.setItem('mv_or_key', key);
    } else {
      toast('Неверный ключ. Нужен ключ OpenRouter (sk-or-...)'); return null;
    }
  }
  return key;
}

async function callClaude(prompt, system='') {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('No API key');
  const messages = [];
  if (system) messages.push({role:'system', content: system});
  messages.push({role:'user', content: prompt});
  const body = { model: MODEL, max_tokens: 1000, messages };
  const r = await fetch(CLAUDE_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
      'HTTP-Referer': 'https://uud-ai.github.io/mindvault/',
      'X-Title': 'MindVault'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    if (r.status === 401) { localStorage.removeItem('mv_or_key'); throw new Error('Invalid key'); }
    throw new Error('API error ' + r.status);
  }
  const d = await r.json();
  return d.choices?.[0]?.message?.content || '';
}

// AI SUMMARIZE
async function summarizeText(text) {
  return await callClaude(
    `Текст: "${text}"\n\nСделай краткое резюме (2-3 предложения) на русском языке. Выдели главную мысль и ключевые идеи. Только резюме, без преамбул.`,
    'Ты помогаешь создавать краткие и точные резюме для личной базы знаний.'
  );
}

async function generateTitle(text) {
  return await callClaude(
    `Текст: "${text.slice(0,500)}"\n\nПридумай короткий, ёмкий заголовок (до 8 слов) на русском языке. Только заголовок, без кавычек.`,
    'Ты придумываешь заголовки для заметок.'
  );
}

// SAVE ENTRY
async function saveEntry(text, tags, type='text', withSummary=false) {
  if (!text.trim()) { toast('Введи текст'); return; }
  const entry = {
    id: uid(), text: text.trim(), tags: parseTags(tags),
    type, createdAt: Date.now(), title: '', summary: ''
  };
  progress(true, 20);
  try {
    entry.title = await generateTitle(text);
    progress(true, 55);
    if (withSummary || text.length > 200) {
      entry.summary = await summarizeText(text);
    }
    progress(true, 90);
  } catch(e) {
    entry.title = text.slice(0,50) + (text.length>50?'...':'');
  }
  progress(false);
  entries.unshift(entry);
  save(); renderEntries(); updateStats();
  toast('✓ Запись сохранена');
  return entry;
}

function parseTags(str) {
  return str.split(/[\s,]+/).map(t => t.replace(/^#/,'').trim()).filter(Boolean);
}

// SUMMARIZE BUTTON
document.getElementById('summarizeBtn').onclick = async () => {
  const text = document.getElementById('entryText').value.trim();
  if (!text) { toast('Введи текст для резюме'); return; }
  const btn = document.getElementById('summarizeBtn');
  btn.disabled = true; btn.textContent = '✦ ...';
  progress(true, 30);
  try {
    const summary = await summarizeText(text);
    progress(true, 90);
    // Show inline preview
    let prev = document.getElementById('inlineSummary');
    if (!prev) {
      prev = document.createElement('div');
      prev.id = 'inlineSummary';
      prev.className = 'entry-summary';
      prev.style.marginTop = '10px';
      document.getElementById('textPanel').appendChild(prev);
    }
    prev.textContent = summary;
    progress(false);
  } catch(e) { toast('Ошибка AI'); progress(false); }
  btn.disabled = false; btn.innerHTML = '✦ AI резюме';
};

document.getElementById('saveTextBtn').onclick = async () => {
  const text = document.getElementById('entryText').value;
  const tags = document.getElementById('tagInp').value;
  const entry = await saveEntry(text, tags, 'text');
  if (entry) {
    document.getElementById('entryText').value = '';
    document.getElementById('tagInp').value = '';
    const prev = document.getElementById('inlineSummary');
    if (prev) prev.remove();
  }
};

// VOICE
function initVoice() {
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Rec) {
    document.getElementById('tabVoice').style.display = 'none';
    return;
  }
  rec = new Rec();
  rec.lang = 'ru-RU'; rec.continuous = true; rec.interimResults = true;
  rec.onresult = e => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    voiceText = t;
    const vt = document.getElementById('voiceTranscript');
    vt.style.display = 'block'; vt.textContent = t;
    document.getElementById('voiceActions').style.display = 'flex';
  };
  rec.onend = () => {
    isRecording = false;
    document.getElementById('micRing').classList.remove('recording');
    document.getElementById('micStatus').textContent = voiceText ? 'Запись завершена' : 'Нажми чтобы начать запись';
  };
}

document.getElementById('micRing').onclick = () => {
  if (!rec) { toast('Голосовой ввод недоступен в этом браузере'); return; }
  if (isRecording) {
    rec.stop(); isRecording = false;
    document.getElementById('micRing').classList.remove('recording');
    document.getElementById('micStatus').textContent = 'Обработка...';
  } else {
    voiceText = '';
    document.getElementById('voiceTranscript').style.display = 'none';
    document.getElementById('voiceActions').style.display = 'none';
    rec.start(); isRecording = true;
    document.getElementById('micRing').classList.add('recording');
    document.getElementById('micStatus').textContent = '🔴 Запись идёт... нажми чтобы остановить';
  }
};

document.getElementById('voiceSummarizeBtn').onclick = async () => {
  if (!voiceText) { toast('Нет текста'); return; }
  const btn = document.getElementById('voiceSummarizeBtn');
  btn.disabled = true; progress(true, 40);
  const summary = await summarizeText(voiceText);
  const vt = document.getElementById('voiceTranscript');
  vt.innerHTML = esc(voiceText) + `<div class="entry-summary" style="margin-top:10px">${esc(summary)}</div>`;
  progress(false); btn.disabled = false;
};

document.getElementById('saveVoiceBtn').onclick = async () => {
  if (!voiceText) { toast('Нет текста для сохранения'); return; }
  const entry = await saveEntry(voiceText, '', 'voice');
  if (entry) {
    voiceText = '';
    document.getElementById('voiceTranscript').style.display = 'none';
    document.getElementById('voiceActions').style.display = 'none';
    document.getElementById('micStatus').textContent = 'Нажми чтобы начать запись';
    switchTab('text');
  }
};

// SEARCH
document.getElementById('searchInp').oninput = e => {
  const q = e.target.value.trim();
  document.getElementById('searchClear').classList.toggle('show', !!q);
  clearTimeout(searchTimer);
  if (!q) { hideAiAnswer(); renderEntries(); return; }
  renderEntries(q); // instant filter
  searchTimer = setTimeout(() => { if (q.length > 5) aiSearch(q); }, 800);
};

document.getElementById('searchClear').onclick = () => {
  document.getElementById('searchInp').value = '';
  document.getElementById('searchClear').classList.remove('show');
  hideAiAnswer(); renderEntries();
};

async function aiSearch(q) {
  if (!entries.length) return;
  const ctx = entries.slice(0,15).map((e,i) => `[${i+1}] "${e.title}": ${e.text.slice(0,300)}`).join('\n\n');
  progress(true, 30);
  try {
    const ans = await callClaude(
      `Вопрос: "${q}"\n\nМои записи:\n${ctx}\n\nОтветь на вопрос используя мои записи. Укажи номера [N] источников. Если ответа нет — скажи об этом. Кратко, по существу.`,
      'Ты умный поисковик по личной базе знаний. Отвечай на русском, кратко и точно.'
    );
    progress(true, 90);
    showAiAnswer(ans, q);
  } catch(e) {}
  progress(false);
}

function showAiAnswer(text, q) {
  const box = document.getElementById('aiAnswer');
  document.getElementById('aiAnswerText').textContent = text;
  // Extract source refs
  const refs = [...text.matchAll(/\[(\d+)\]/g)].map(m => parseInt(m[1])-1);
  const unique = [...new Set(refs)].filter(i => entries[i]);
  const src = document.getElementById('aiSources');
  src.innerHTML = '';
  if (unique.length) {
    const lbl = document.createElement('span');
    lbl.style.cssText = 'font-size:11px;color:var(--ink2);font-style:italic;margin-right:4px';
    lbl.textContent = 'Источники:';
    src.appendChild(lbl);
    unique.forEach(i => {
      const chip = document.createElement('span');
      chip.className = 'ai-source-chip';
      chip.textContent = entries[i].title.slice(0,30);
      chip.onclick = () => openDetail(entries[i].id);
      src.appendChild(chip);
    });
  }
  box.classList.add('show');
}
function hideAiAnswer() { document.getElementById('aiAnswer').classList.remove('show'); }

// RENDER ENTRIES
function renderEntries(query='') {
  const list = document.getElementById('entriesList');
  let filtered = entries;
  if (query) {
    const q = query.toLowerCase();
    filtered = entries.filter(e =>
      e.title.toLowerCase().includes(q) ||
      e.text.toLowerCase().includes(q) ||
      (e.summary||'').toLowerCase().includes(q) ||
      e.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  document.getElementById('sectionTitle').textContent = query ? `Результаты: «${query}»` : 'Последние записи';
  document.getElementById('sectionCount').textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${query ? '🔍' : '📖'}</div>
      <div class="empty-title">${query ? 'Ничего не найдено' : 'База знаний пуста'}</div>
      <div class="empty-sub">${query ? 'Попробуй другой запрос' : 'Добавь первую запись — мысль, идею или конспект'}</div>
    </div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach(e => list.appendChild(buildCard(e)));
}

function buildCard(e) {
  const card = document.createElement('div');
  card.className = 'entry-card ' + (e.type==='voice'?'voice-type':'text-type');
  card.innerHTML = `
    <div class="entry-actions-row">
      <button class="entry-act del" onclick="deleteEntry('${e.id}',event)">✕</button>
    </div>
    <div class="entry-type-badge ${e.type==='voice'?'voice':'text'}">
      ${e.type==='voice'?'🎙 Голосовая':'✍️ Текстовая'}
    </div>
    <div class="entry-title">${esc(e.title||'Без заголовка')}</div>
    <div class="entry-preview">${esc(e.text)}</div>
    ${e.summary ? `<div class="entry-summary">${esc(e.summary)}</div>` : ''}
    <div class="entry-footer">
      ${e.tags.map(t=>`<span class="entry-tag">#${esc(t)}</span>`).join('')}
      <span class="entry-date">${fmtDate(e.createdAt)}</span>
    </div>`;
  card.onclick = ev => { if (!ev.target.classList.contains('entry-act')) openDetail(e.id); };
  return card;
}

// DETAIL
function openDetail(id) {
  curEntry = entries.find(e => e.id === id);
  if (!curEntry) return;
  document.getElementById('detailTitle').value = curEntry.title || '';
  document.getElementById('detailBody').value = curEntry.text || '';
  const sb = document.getElementById('detailSummaryBox');
  if (curEntry.summary) {
    sb.style.display = 'block';
    document.getElementById('detailSummaryText').textContent = curEntry.summary;
  } else sb.style.display = 'none';
  document.getElementById('chatMessages').innerHTML = '';
  // Load existing cards
  curCards = curEntry.cards || [];
  cardsKnown = new Set();
  document.getElementById('cardsSection').style.display = 'block';
  document.getElementById('genCardsBtn').textContent = curCards.length ? '✦ Обновить' : '✦ Сгенерировать';
  if (curCards.length) renderCards();
  else { document.getElementById('cardsGrid').innerHTML = ''; document.getElementById('cardsProgress').style.display='none'; document.getElementById('cardsDone').classList.remove('show'); }
  document.getElementById('detailView').classList.add('open');
  autoResize(document.getElementById('detailTitle'));
  autoResize(document.getElementById('detailBody'));
}

document.getElementById('backBtn').onclick = () => {
  // save edits
  if (curEntry) {
    curEntry.title = document.getElementById('detailTitle').value;
    curEntry.text = document.getElementById('detailBody').value;
    save(); renderEntries();
  }
  document.getElementById('detailView').classList.remove('open');
};

document.getElementById('detailDelBtn').onclick = () => {
  if (!curEntry) return;
  deleteEntry(curEntry.id);
  document.getElementById('detailView').classList.remove('open');
};

// CHAT IN DETAIL
document.getElementById('chatSend').onclick = sendChat;
document.getElementById('chatInp').onkeydown = e => { if(e.key==='Enter') sendChat(); };

async function sendChat() {
  if (!curEntry) return;
  const inp = document.getElementById('chatInp');
  const q = inp.value.trim(); if (!q) return;
  inp.value = '';
  const msgs = document.getElementById('chatMessages');
  // User bubble
  const ub = document.createElement('div');
  ub.className = 'chat-msg user'; ub.textContent = q;
  msgs.appendChild(ub);
  // Thinking
  const tb = document.createElement('div');
  tb.className = 'chat-msg ai';
  tb.innerHTML = '<div class="thinking"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>';
  msgs.appendChild(tb);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const ans = await callClaude(
      `Запись: "${curEntry.title}"\n\nТекст: "${curEntry.text}"\n\nВопрос: "${q}"\n\nОтветь на вопрос, опираясь на содержание записи.`,
      'Ты помогаешь осмыслить личные заметки. Отвечай кратко, по-русски, в дружеском тоне.'
    );
    tb.innerHTML = ans;
  } catch(e) { tb.textContent = 'Ошибка. Попробуй ещё раз.'; }
  msgs.scrollTop = msgs.scrollHeight;
}

// DELETE
function deleteEntry(id, e) {
  if (e) e.stopPropagation();
  entries = entries.filter(x => x.id !== id);
  save(); renderEntries(); renderTags(); updateStats();
  toast('Запись удалена');
}
window.deleteEntry = deleteEntry;


// ========== FLASHCARDS ==========
let curCards = [];
let cardsKnown = new Set();

async function generateCards() {
  if (!curEntry) return;
  const btn = document.getElementById('genCardsBtn');
  btn.disabled = true; btn.textContent = '✦ Генерирую...';
  progress(true, 30);
  try {
    const result = await callClaude(
      `Текст: "${curEntry.text.slice(0, 2000)}"\n\nСоздай 6-8 флэш-карточек для запоминания ключевых идей.\nФормат строго JSON массив:\n[{"q": "вопрос", "a": "ответ"}, ...]\nТолько JSON, без пояснений.`,
      'Ты создаёшь флэш-карточки для запоминания. Вопросы должны проверять понимание, а не просто факты. Отвечай только JSON.'
    );
    progress(true, 80);
    const clean = result.replace(/\`\`\`json|\`\`\`/g, '').trim();
    curCards = JSON.parse(clean);
    cardsKnown = new Set();
    // Save to entry
    curEntry.cards = curCards;
    save();
    renderCards();
    progress(false);
  } catch(e) {
    toast('Ошибка генерации карточек'); progress(false);
    console.error(e);
  }
  btn.disabled = false; btn.textContent = '✦ Обновить';
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const prog = document.getElementById('cardsProgress');
  const done = document.getElementById('cardsDone');
  grid.innerHTML = '';
  if (!curCards.length) return;
  prog.style.display = 'flex';
  updateCardsProgress();
  curCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'flashcard' + (cardsKnown.has(i) ? ' card-known' : '');
    div.innerHTML = `
      <div class="card-question" onclick="toggleCard(${i})">
        <div class="card-q-icon">Q</div>
        <span>${esc(card.q)}</span>
      </div>
      <div class="card-answer" id="card-ans-${i}">${esc(card.a)}</div>
      <div class="card-footer" id="card-foot-${i}">
        <button class="card-rate know" onclick="rateCard(${i}, true)">✓ Знаю</button>
        <button class="card-rate again" onclick="rateCard(${i}, false)">↺ Ещё раз</button>
      </div>`;
    grid.appendChild(div);
  });
  done.classList.toggle('show', cardsKnown.size === curCards.length);
}

window.toggleCard = function(i) {
  const ans = document.getElementById('card-ans-' + i);
  const foot = document.getElementById('card-foot-' + i);
  ans.classList.toggle('show');
  foot.classList.toggle('show');
};

window.rateCard = function(i, knew) {
  if (knew) {
    cardsKnown.add(i);
    const card = document.querySelector('.flashcard:nth-child(' + (i+1) + ')');
    if (card) card.classList.add('card-known');
  } else {
    cardsKnown.delete(i);
  }
  updateCardsProgress();
  // Close the card
  document.getElementById('card-ans-' + i).classList.remove('show');
  document.getElementById('card-foot-' + i).classList.remove('show');
  const done = document.getElementById('cardsDone');
  done.classList.toggle('show', cardsKnown.size === curCards.length);
};

function updateCardsProgress() {
  const total = curCards.length;
  const known = cardsKnown.size;
  document.getElementById('cardsProgressText').textContent = known + ' / ' + total;
  document.getElementById('cardsProgFill').style.width = (total ? known/total*100 : 0) + '%';
}

document.getElementById('genCardsBtn').onclick = generateCards;

// TAGS VIEW
function renderTags() {
  const allTags = [...new Set(entries.flatMap(e => e.tags))].sort();
  const grid = document.getElementById('tagsGrid');
  grid.innerHTML = '';
  if (!allTags.length) {
    grid.innerHTML = '<div style="color:var(--ink2);font-style:italic;font-size:14px">Тегов пока нет — добавь #тег при сохранении</div>';
    return;
  }
  allTags.forEach(tag => {
    const cnt = entries.filter(e => e.tags.includes(tag)).length;
    const btn = document.createElement('button');
    btn.className = 'tag-filter' + (activeTag===tag?' active':'');
    btn.textContent = `#${tag} (${cnt})`;
    btn.onclick = () => {
      activeTag = activeTag===tag ? null : tag;
      renderTags();
      const tagList = document.getElementById('tagEntriesList');
      tagList.innerHTML = '';
      if (activeTag) {
        const filtered = entries.filter(e => e.tags.includes(activeTag));
        filtered.forEach(e => tagList.appendChild(buildCard(e)));
      }
    };
    grid.appendChild(btn);
  });
}

// STATS VIEW
function showStats() {
  const total = entries.length;
  const texts = entries.filter(e=>e.type==='text').length;
  const voices = entries.filter(e=>e.type==='voice').length;
  const withSummary = entries.filter(e=>e.summary).length;
  const allTags = [...new Set(entries.flatMap(e=>e.tags))];
  const today = entries.filter(e => new Date(e.createdAt).toDateString()===new Date().toDateString()).length;
  const el = document.getElementById('homeView');
  el.innerHTML = `<div class="entries-wrap">
    <div class="section-hdr"><div class="section-title">Статистика</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      ${statCard('📚', 'Всего записей', total)}
      ${statCard('✍️', 'Текстовых', texts)}
      ${statCard('🎙', 'Голосовых', voices)}
      ${statCard('✦', 'С AI резюме', withSummary)}
      ${statCard('🏷', 'Уникальных тегов', allTags.length)}
      ${statCard('📅', 'Сегодня добавлено', today)}
    </div>
    ${allTags.length ? `<div class="section-title" style="margin-bottom:12px">Топ теги</div>
    <div class="tags-grid">${allTags.slice(0,12).map(t=>`<span class="tag-filter">#${esc(t)}</span>`).join('')}</div>` : ''}
  </div>`;
}
function statCard(icon, label, val) {
  return `<div style="background:#fff;border:1.5px solid var(--paper3);border-radius:14px;padding:16px;box-shadow:var(--shadow)">
    <div style="font-size:24px;margin-bottom:6px">${icon}</div>
    <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--accent)">${val}</div>
    <div style="font-size:13px;color:var(--ink2);margin-top:2px">${label}</div>
  </div>`;
}

// VIEWS
function setView(v) {
  curView = v;
  ['navHome','navTags','navStats'].forEach(id => document.getElementById(id).classList.remove('active'));
  if (v==='home') {
    document.getElementById('navHome').classList.add('active');
    document.getElementById('homeView').style.display = 'block';
    document.getElementById('tagsView').style.display = 'none';
    document.getElementById('addSection').style.display = 'block';
    document.getElementById('mainSearch').style.display = 'block';
    renderEntries();
  } else if (v==='tags') {
    document.getElementById('navTags').classList.add('active');
    document.getElementById('homeView').style.display = 'none';
    document.getElementById('tagsView').style.display = 'block';
    document.getElementById('addSection').style.display = 'none';
    document.getElementById('mainSearch').style.display = 'none';
    renderTags();
  } else if (v==='stats') {
    document.getElementById('navStats').classList.add('active');
    document.getElementById('homeView').style.display = 'block';
    document.getElementById('tagsView').style.display = 'none';
    document.getElementById('addSection').style.display = 'none';
    document.getElementById('mainSearch').style.display = 'none';
    showStats();
  }
}
window.setView = setView;

load();

// ========== PDF + OCR ==========
// Load PDF.js
(function() {
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload = () => { pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; };
  document.head.appendChild(s);
})();

// Load Tesseract.js for OCR
(function() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
  document.head.appendChild(s);
})();

function finishTextExtract(text, filename, extra) {
  const textarea = document.getElementById('entryText');
  const info = document.getElementById('pdfInfo');
  document.getElementById('pdfLoading').style.display = 'none';
  document.getElementById('ocrLoading').style.display = 'none';
  textarea.value = text.trim();
  autoResize(textarea);
  if (!document.getElementById('tagInp').value) {
    document.getElementById('tagInp').value = '#скан';
  }
  document.getElementById('pdfInfoText').textContent = filename + (extra ? ' — ' + extra : '') + ', ' + text.length + ' символов';
  info.classList.add('show');
  toast('Текст извлечён!');
}

// PDF handler
document.getElementById('pdfFileInp').onchange = async function(e) {
  const file = e.target.files[0]; if (!file) return;
  const loading = document.getElementById('pdfLoading');
  document.getElementById('pdfInfo').classList.remove('show');
  loading.style.display = 'block'; loading.textContent = '📄 Извлекаю текст из PDF...';
  try {
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let txt = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      txt += content.items.map(x => x.str).join(' ') + ' ';
    }
    if (!txt.trim()) { toast('Пустой PDF — попробуй кнопку Скан/Фото'); loading.style.display='none'; return; }
    finishTextExtract(txt, file.name, pdf.numPages + ' стр.');
  } catch(err) { console.error(err); toast('Ошибка PDF'); loading.style.display='none'; }
  this.value = '';
};

// OCR handler (images + scanned PDFs)
document.getElementById('ocrFileInp').onchange = async function(e) {
  const file = e.target.files[0]; if (!file) return;
  const ocrLoading = document.getElementById('ocrLoading');
  const ocrProgress = document.getElementById('ocrProgress');
  document.getElementById('pdfInfo').classList.remove('show');
  ocrLoading.style.display = 'block';
  ocrProgress.textContent = '0%';
  try {
    if (typeof Tesseract === 'undefined') {
      toast('Tesseract ещё загружается, подожди секунду');
      ocrLoading.style.display = 'none'; return;
    }
    const worker = await Tesseract.createWorker(['rus', 'eng'], 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          ocrProgress.textContent = Math.round(m.progress * 100) + '%';
        }
      }
    });
    const { data: { text } } = await worker.recognize(file);
    await worker.terminate();
    if (!text.trim()) { toast('Текст не распознан — проверь качество изображения'); ocrLoading.style.display='none'; return; }
    if (!document.getElementById('tagInp').value) {
      document.getElementById('tagInp').value = '#скан';
    }
    finishTextExtract(text, file.name, '');
  } catch(err) { console.error(err); toast('Ошибка OCR: ' + err.message); ocrLoading.style.display='none'; }
  this.value = '';
};
